name: Build & deploy docs site

# Renders the Markdown into a MkDocs Material site and publishes it to the gh-pages branch.
# After the first successful run, enable GitHub Pages (Settings > Pages > Branch: gh-pages).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install MkDocs Material
        run: pip install mkdocs-material
      - name: Assemble docs_dir (content lives at repo root)
        run: bash scripts/build-site.sh
      - name: Build and deploy to gh-pages
        run: mkdocs gh-deploy --force
